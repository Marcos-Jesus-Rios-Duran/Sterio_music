<section id="testimonialsSection" class="testimonials-page page-padding">
    <header class="section-header">
        <h1 class="section-title" id="mainTitle">
            Comunidad SteroMusic
            <button id="btnEditTitle" class="icon-btn-small" title="Editar título"><span
                    class="material-icons-outlined">edit</span></button>
        </h1>
        <p class="section-subtitle">Lo que nuestros alumnos opinan de su formación musical.</p>

        <div class="testimonials-controls">
            <button id="btnOpenModal" class="btn-primary">
                <span class="material-icons-outlined">add_comment</span> Publicar Experiencia
            </button>
            <div class="btn-group-mini">
                <button id="btnToggleAnim" class="btn-secondary-outline" title="Pausar/Reanudar carrusel">
                    <span id="animIcon" class="material-icons-outlined">pause</span>
                </button>
                <button id="btnToggleVisibility" class="btn-secondary-outline" title="Mostrar/Ocultar testimonios">
                    <span id="visibilityIcon" class="material-icons-outlined">visibility</span>
                </button>
            </div>
        </div>
    </header>

    <div id="scrollWrapper" class="scroll-container">
        <div id="testimonialsGrid" class="testimonials-track"></div>
    </div>

    <div id="hiddenMessage" class="hidden-message hidden" style="text-align: center; margin-top: 20px;">
        <p style="color: var(--primary-color);">Has ocultado las reseñas de la comunidad.</p>
    </div>

    <div id="testimonialModal" class="modal-overlay hidden">
        <div class="modal-content card-style">
            <div class="modal-header">
                <h3>Nueva Reseña</h3>
                <button id="btnCloseModal" class="close-btn"><span class="material-icons-outlined">close</span></button>
            </div>

            <div id="discardAlert" class="custom-alert hidden">
                <p>⚠️ ¿Seguro que quieres descartar los cambios?</p>
                <div class="alert-actions">
                    <button id="btnConfirmDiscard" class="btn-danger-small">Descartar</button>
                    <button id="btnCancelDiscard" class="btn-secondary-small">Cancelar</button>
                </div>
            </div>

            <form id="testimonialForm" class="modal-form">
                <div class="form-group">
                    <label for="userName">Tu nombre</label>
                    <input type="text" id="userName" required placeholder="Ej. Camila Mendoza">
                </div>

                <div class="form-group">
                    <label>Calificación: <span id="ratingDisplay">5.0</span></label>
                    <div id="interactiveStars" class="interactive-stars">
                        <span class="material-icons-outlined star-icon" data-index="1">star</span>
                        <span class="material-icons-outlined star-icon" data-index="2">star</span>
                        <span class="material-icons-outlined star-icon" data-index="3">star</span>
                        <span class="material-icons-outlined star-icon" data-index="4">star</span>
                        <span class="material-icons-outlined star-icon" data-index="5">star</span>
                    </div>
                    <input type="hidden" id="ratingValue" value="5">
                </div>

                <div class="form-group">
                    <label for="userComment">Tu reseña</label>
                    <textarea id="userComment" rows="4" required placeholder="Cuéntanos tu experiencia..."></textarea>
                    <small id="charCount" style="color: gray; display: block; text-align: right; margin-top: 5px;">0/200
                        caracteres</small>
                </div>
                <button type="submit" class="btn-primary full-width">Enviar Testimonio</button>
            </form>
        </div>
    </div>
</section>
<link rel="stylesheet" href="/features/testimonios/testimonios.css">
