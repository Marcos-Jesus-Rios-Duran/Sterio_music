<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteroMusic</title>

    <link rel="stylesheet" href="/core/css/globals.css">
    <link rel="stylesheet" href="/core/css/home.css">
    <link rel="stylesheet" href="/core/css/scroll-section.css">
    <link rel="stylesheet" href="/core/components/breadcrumb/breadcrumbs.css">
    <link rel="stylesheet" href="/features/404/404.css">
    <link rel="stylesheet" href="/features/registro/registro.css">
</head>

<body>

    <div id="navbar-shell"></div>
    <div id="breadcrumb-shell"></div>

    <main id="main-content"></main>

    <div id="footer-shell"></div>

    <script src="https://unpkg.com/validator@latest/validator.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" defer></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script src="/core/utils/validators.js" defer></script>
    <script src="/routes.js" defer></script>

    <script src="/core/components/stero-logo.js" defer></script>
    <script src="/core/components/navbar/navbar.js" defer></script>
    <script src="/core/components/breadcrumb/breadcrumbs.js" defer></script>

    <script src="/router.js" defer></script>

    <script src="/features/home/home.js" defer></script>
    <script src="/features/404/404.js" defer></script>
    <script src="/features/registro/registro-form.js" defer></script>
    <script src="/features/registro/registro.js" defer></script>
    <script src="/features/nosotros/nosotros.js" defer></script>

    <script src="/features/testimonios/testimonios.js" defer></script>

    <script src="/app.js" defer></script>
</body>
<div id="theme-modal" class="modal-overlay hidden">
    <div class="modal-content card-style" style="position: relative; padding: 40px 30px; max-width: 900px; width: 95%;">
        
        <button onclick="ThemeManager.cancelChange()" style="position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: var(--text-dim); font-size: 28px; cursor: pointer; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-dim)'">&times;</button>

        <h3 style="margin-bottom: 25px; color: var(--title); font-size: 1.8rem;">🎨 Diseñador de Interfaz</h3>

        <div style="display: flex; flex-wrap: wrap; gap: 30px; text-align: left;">
            
            <div class="mini-preview" style="flex: 1; min-width: 300px; background: var(--bg); border: 1px solid var(--border-card); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: all var(--transition-speed) ease;">
                
                <div style="background: var(--bg); border-bottom: 1px solid var(--border-card); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--primary-color); font-weight: 900; font-size: 16px;">SteroMusic</span>
                    <div style="display: flex; gap: 10px;">
                        <span style="color: var(--text); font-size: 12px;">Cursos</span>
                        <span style="color: var(--text-dim); font-size: 12px;">Nosotros</span>
                    </div>
                </div>

                <div style="padding: 25px 20px; text-align: center;">
                    <h4 style="color: var(--title); font-size: 22px; margin-bottom: 8px;">Aprende Música</h4>
                    <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 15px; line-height: 1.5;">Domina tu instrumento con los mejores maestros de la industria.</p>
                </div>

                <div style="padding: 0 20px 25px 20px; flex: 1;">
                    <div style="background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                        <img src="/assets/instruments.webp" alt="Preview" style="width: 100%; height: 100px; object-fit: cover; filter: brightness(0.8);">
                        <div style="padding: 15px;">
                            <h5 style="color: var(--title); font-size: 15px; margin-bottom: 5px;">Guitarra Eléctrica</h5>
                            <p style="color: var(--text); font-size: 11px; margin-bottom: 15px;">Aprende solos increíbles.</p>
                            <div style="background: var(--btn-bg); color: var(--btn-text); padding: 8px 15px; border-radius: 50px; font-size: 11px; font-weight: bold; text-align: center; display: inline-block;">Ver Curso</div>
                        </div>
                    </div>
                </div>
            </div>

            <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px;">
                
                <div style="background: var(--bg-modal); padding: 15px; border-radius: 12px; border: 1px solid var(--border-card);">
                    <h5 style="color: var(--title); margin-bottom: 15px; font-size: 14px;">Estructura y Fondos</h5>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label style="font-size: 11px; color: var(--text);">Color de Identidad</label><input type="color" oninput="ThemeManager.preview('--primary-color', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Fondo de la Web</label><input type="color" oninput="ThemeManager.preview('--bg', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Fondo Tarjetas</label><input type="color" oninput="ThemeManager.preview('--bg-card', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Fondo Modal</label><input type="color" oninput="ThemeManager.preview('--bg-modal', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                    </div>
                </div>

                <div style="background: var(--bg-modal); padding: 15px; border-radius: 12px; border: 1px solid var(--border-card);">
                    <h5 style="color: var(--title); margin-bottom: 15px; font-size: 14px;">Tipografía</h5>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                        <div><label style="font-size: 11px; color: var(--text);">Títulos</label><input type="color" oninput="ThemeManager.preview('--title', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Párrafos</label><input type="color" oninput="ThemeManager.preview('--text', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Atenuado</label><input type="color" oninput="ThemeManager.preview('--text-dim', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                    </div>
                </div>

                <div style="background: var(--bg-modal); padding: 15px; border-radius: 12px; border: 1px solid var(--border-card);">
                    <h5 style="color: var(--title); margin-bottom: 15px; font-size: 14px;">Bordes y Botones</h5>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                        <div><label style="font-size: 11px; color: var(--text);">Bordes</label><input type="color" oninput="ThemeManager.preview('--border-card', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Fondo Botón</label><input type="color" oninput="ThemeManager.preview('--btn-bg', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                        <div><label style="font-size: 11px; color: var(--text);">Texto Botón</label><input type="color" oninput="ThemeManager.preview('--btn-text', this.value)" style="width: 100%; height: 30px; border-radius: 4px; cursor: pointer;"></div>
                    </div>
                </div>

            </div>
        </div>

        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px; border-top: 1px solid var(--border-card); padding-top: 20px;">
            <button onclick="ThemeManager.resetToDefaults()" style="background: transparent; border: none; color: #ff4444; font-weight: bold; cursor: pointer; text-decoration: underline;">Restaurar Tema Base</button>
            <div style="flex: 1;"></div>
            <button onclick="ThemeManager.cancelChange()" class="btn-secondary" style="padding: 10px 24px; font-size: 14px;">Cancelar</button>
            <button onclick="ThemeManager.confirmChange()" class="btn-primary" style="padding: 10px 24px; font-size: 14px;">Guardar Cambios</button>
        </div>
    </div>
</div>

</html>
